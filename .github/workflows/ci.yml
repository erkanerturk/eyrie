name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # Liquid Glass APIs need the macOS 26 SDK / Xcode 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Package tests
        run: |
          for pkg in Packages/*/; do
            echo "::group::$pkg"
            swift test --package-path "$pkg"
            echo "::endgroup::"
          done

      - name: Build app
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild -project Eyrie.xcodeproj -scheme Eyrie \
            -configuration Debug build CODE_SIGNING_ALLOWED=NO
